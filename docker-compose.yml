services:
  postgres:
    image: postgres:15-alpine
    container_name: codex-blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codex_blog
    ports:
      - "5432:5432"
    volumes:
      - codex_blog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codex_blog"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  codex_blog_pgdata:
